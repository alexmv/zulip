[program:prometheus]
command=/opt/prometheus/prometheus --storage.tsdb.path="/var/lib/prometheus" --config.file="/etc/prometheus/prometheus.yml" --web.listen-address="127.0.0.1:9090"
directory=/opt/prometheus
priority=10
autostart=true
autorestart=true
user=prometheus
redirect_stderr=true
stdout_logfile=/var/log/prometheus.log
